<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password</title>
  <script src="data.js"></script>
  <link rel="stylesheet" href="password_style.css" />
</head>
<body>

<div class="box">
  <h2>🔒 Šifra</h2>
  <p class="subtitle" id="passwordTitle"></p>
  <input type="text" id="input" placeholder="Zadej Heslo …" />
  <button onclick="check()">Zkontrolovat</button>
  <div id="message"></div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get("id"));
  const station = stations[id];

  // Set title (supports HTML like <br> and <b>)
  document.getElementById("passwordTitle").innerHTML = station.passwordTitle || ("Station " + (id + 1));
  document.title = "Password – Station " + (id + 1);

  function check() {
    const input = document.getElementById("input").value;
    const message = document.getElementById("message");

    // Case-insensitive comparison
    const isCorrect = station.passwords.some(pw => pw.toLowerCase() === input.toLowerCase());
    if (isCorrect) {
      message.className = "correct";
      message.textContent = "✅ Správně! Jdi na další místo…";
      setTimeout(() => {
        window.location.href = "tracker.html?id=" + id;
      }, 1000);
    } else {
      message.textContent = "❌ Špatné heslo.";
      message.className = "wrong";
    }
  }

  document.getElementById("input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") check();
  });
</script>

</body>
</html>
